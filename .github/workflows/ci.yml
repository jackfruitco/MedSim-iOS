name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IOS_SIMULATOR_DESTINATION: platform=iOS Simulator,name=iPhone 17 Pro
  XCODE_PROJECT: MedSim.xcodeproj
  XCODE_SCHEME: MedSim
  COVERAGE_THRESHOLD: 70

jobs:
  swiftformat-check:
    name: SwiftFormat
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Verify SwiftFormat version
        run: swiftformat --version

      - name: Check formatting
        run: |
          set -euo pipefail
          swiftformat MedSim MedSimTests MedSimUITests apps \
            --config .swiftformat \
            --lint

  swiftlint-check:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Verify SwiftLint version
        run: swiftlint version

      - name: Lint
        run: |
          set -euo pipefail
          swiftlint lint --strict --config .swiftlint.yml --force-exclude --no-cache

  spm-trainerlab:
    name: SPM Package Validation TrainerLabiOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        working-directory: apps/trainerlab-ios
        run: |
          set -euo pipefail
          swift package resolve

      - name: Build and test package
        working-directory: apps/trainerlab-ios
        run: |
          set -euo pipefail
          swift test

  spm-chatlab:
    name: SPM Package Validation ChatLabiOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        working-directory: apps/chatlab-ios
        run: |
          set -euo pipefail
          swift package resolve

      - name: Build and test package
        working-directory: apps/chatlab-ios
        run: |
          set -euo pipefail
          swift test

  spm-shell:
    name: SPM Package Validation MedSimShelliOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        working-directory: apps/medsim-shell-ios
        run: |
          set -euo pipefail
          swift package resolve

      - name: Build package
        working-directory: apps/medsim-shell-ios
        run: |
          set -euo pipefail
          swift build

  ios-build:
    name: iOS Build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Set temp paths
        run: |
          echo "CLONED_SOURCE_PACKAGES_DIR=$RUNNER_TEMP/cloned-source-packages-build" >> "$GITHUB_ENV"
          echo "DERIVED_DATA_PATH=$RUNNER_TEMP/derived-data-build" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Resolve Xcode package dependencies
        run: |
          set -euo pipefail
          mkdir -p "$CLONED_SOURCE_PACKAGES_DIR"
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$CLONED_SOURCE_PACKAGES_DIR"

      - name: Build for testing
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$CLONED_SOURCE_PACKAGES_DIR" \
            CODE_SIGNING_ALLOWED=NO

  ios-unit-tests:
    name: iOS Unit Tests
    runs-on: macos-15
    needs: ios-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Set temp paths
        run: |
          echo "CLONED_SOURCE_PACKAGES_DIR=$RUNNER_TEMP/cloned-source-packages-unit" >> "$GITHUB_ENV"
          echo "DERIVED_DATA_PATH=$RUNNER_TEMP/derived-data-unit" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Resolve Xcode package dependencies
        run: |
          set -euo pipefail
          mkdir -p "$CLONED_SOURCE_PACKAGES_DIR"
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$CLONED_SOURCE_PACKAGES_DIR"

      - name: Run unit tests with coverage
        run: |
          set -euo pipefail
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$CLONED_SOURCE_PACKAGES_DIR" \
            -enableCodeCoverage YES \
            -only-testing:MedSimTests \
            CODE_SIGNING_ALLOWED=NO

  ios-ui-smoke:
    name: iOS UI Smoke Tests
    runs-on: macos-15
    needs: ios-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Set temp paths
        run: |
          echo "CLONED_SOURCE_PACKAGES_DIR=$RUNNER_TEMP/cloned-source-packages-ui" >> "$GITHUB_ENV"
          echo "DERIVED_DATA_PATH=$RUNNER_TEMP/derived-data-ui" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Resolve Xcode package dependencies
        run: |
          set -euo pipefail
          mkdir -p "$CLONED_SOURCE_PACKAGES_DIR"
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$CLONED_SOURCE_PACKAGES_DIR"

      - name: Run UI smoke test
        run: |
          set -euo pipefail
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$CLONED_SOURCE_PACKAGES_DIR" \
            -only-testing:MedSimUITests/testLaunchShowsMedSimBrandingOnAuthGate \
            CODE_SIGNING_ALLOWED=NO
